name: Deploy to VPS

on:
  push:
    branches: [wizz]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy WizzDesk
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}
            git fetch origin
            git checkout wizz
            git pull origin wizz
            git submodule update --init --recursive
            docker stack deploy -c docker-stack.yml wizzdesk --with-registry-auth
            echo "✅ WizzDesk deployed at $(date)"
